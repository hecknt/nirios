name: Build container image

on:
  push:
    branches: [stable]
    paths-ignore: ["**/README.md"]
  pull_request:
    branches: [stable]
  workflow_dispatch:
    inputs:
      force-rebuild:
        description: Force rebuild of full image
        default: false
        type: boolean
      skip-base:
        description: Skip building Hawaii image
        default: false
        type: boolean
      skip-jackrabbit:
        description: Skip building Hawaii Jackrabbit image
        default: false
        type: boolean

env:
  IMAGE_DESC: "Opinionated niri + bootc image"
  IMAGE_KEYWORDS: "bootc,niri,freedesktop-sdk"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/237492973?s=400&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-hawaii:
    name: Build Hawaii Bootc Image
    if: |
      github.event.inputs.skip-base == 'false' || !github.event.inputs.skip-base
    uses: ./.github/workflows/reusable-build-bootc.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      image-name: "zirconium-hawaii"
      element: "oci/zirconium/stack.bst"
      image-element: "oci/zirconium/image.bst"
      default-tag: "latest"
      force-rebuild: ${{ github.event.inputs.force-rebuild }}
      publish: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/stable', github.event.repository.default_branch) }}

  # Run this build AFTER build-hawaii. build-hawaii will cache all of the base packages.
  build-hawaii-jackrabbit:
    name: Build Hawaii Jackrabbit Bootc Image
    if: |
      !failure() && !cancelled() &&
      (github.event.inputs.skip-jackrabbit == 'false' || !github.event.inputs.skip-jackrabbit)
    uses: ./.github/workflows/reusable-build-bootc.yml
    needs: build-hawaii
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      image-name: "zirconium-hawaii-jackrabbit"
      element: "oci/jackrabbit/stack.bst"
      image-element: "oci/jackrabbit/image.bst"
      default-tag: "latest"
      force-rebuild: ${{ github.event.inputs.force-rebuild }}
      publish: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/stable', github.event.repository.default_branch) }}
